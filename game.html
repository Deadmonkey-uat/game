<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blackjack</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #327034; color: white; }
        .container { margin-top: 50px; }
        .cards { font-size: 24px; margin: 20px; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; margin: 5px; }
        #message { font-weight: bold; font-size: 1.5em; margin: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Blackjack 21</h1>
        <p id="message">Press 'New Game' to start!</p>
        <div class="cards">Player Total: <span id="player-sum">0</span></div>
        <div class="cards">Dealer Total: <span id="dealer-sum">0</span></div>
        <button onclick="startGame()">New Game</button>
        <button id="hit-btn" onclick="hit()" disabled>Hit</button>
        <button id="stand-btn" onclick="stand()" disabled>Stand</button>
    </div>

    <script>
        let playerSum = 0;
        let dealerSum = 0;
        let gameOver = false;

        function getRandomCard() {
            // Returns a number between 2 and 11
            return Math.floor(Math.random() * 10) + 2; 
        }

        function startGame() {
            playerSum = getRandomCard() + getRandomCard();
            dealerSum = getRandomCard(); // Dealer starts with one visible "card"
            gameOver = false;
            document.getElementById("hit-btn").disabled = false;
            document.getElementById("stand-btn").disabled = false;
            updateUI("Your turn! Hit or Stand?");
        }

        function hit() {
            if (gameOver) return;
            playerSum += getRandomCard();
            if (playerSum > 21) {
                endGame("Busted! Dealer Wins.");
            } else {
                updateUI("Hit or Stand?");
            }
        }

        function stand() {
            if (gameOver) return;
            // Simple Dealer AI: hits until reaching 17 or higher
            while (dealerSum < 17) {
                dealerSum += getRandomCard();
            }
            
            if (dealerSum > 21 || playerSum > dealerSum) {
                endGame("You Win!");
            } else if (playerSum < dealerSum) {
                endGame("Dealer Wins.");
            } else {
                endGame("It's a Tie!");
            }
        }

        function updateUI(msg) {
            document.getElementById("player-sum").innerText = playerSum;
            document.getElementById("dealer-sum").innerText = dealerSum;
            document.getElementById("message").innerText = msg;
        }

        function endGame(msg) {
            gameOver = true;
            updateUI(msg);
            document.getElementById("hit-btn").disabled = true;
            document.getElementById("stand-btn").disabled = true;
        }
    </script>
</body>
</html>
